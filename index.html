<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO + Profesyonel -->
  <title>Safa Şentürk | Android Developer Portfolio</title>
  <meta name="description" content="Computer Engineering student focused on Android development with Kotlin and Jetpack Compose." />
  <meta name="author" content="Safa Şentürk" />

  <!-- Font (daha modern görünüm ama sade) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --soft: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-2: #22c55e;
      --border: rgba(255,255,255,0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', Arial, sans-serif;
      background: linear-gradient(180deg, #0b1220 0%, var(--bg) 100%);
      color: var(--text);
      line-height: 1.6;
      padding: 20px;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: var(--card);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      margin-bottom: 20px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    h2 {
      margin-bottom: 10px;
      color: var(--accent);
    }

    p {
      color: var(--muted);
    }

    .links a {
      margin-right: 15px;
      font-weight: 600;
    }
  </style>
</head>
